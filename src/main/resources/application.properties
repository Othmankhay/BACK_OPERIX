spring.application.name=operix

# Connexion SQL Server locale
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=operix;encrypt=false;trustServerCertificate=true
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver
spring.datasource.username=operix_app
spring.datasource.password=OperixDev123!

# Configuration Hibernate (SQL Server)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect

# JWT defaults pour eviter une config vide au demarrage local
operix.jwt.secret=dev-secret-change-me
operix.jwt.expiration=900000
operix.jwt.refresh-expiration=604800000

# SAP import (valeurs par defaut locales)
operix.sap.import-folder=./data/import
operix.sap.archive-folder=./data/archive
operix.sap.cron=0 0/30 * * * *

# Scheduler KPI
operix.kpi.cron=0 0 2 * * *
spring.security.user.name=admin
spring.security.user.password=admin
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration
